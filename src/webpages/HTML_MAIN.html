
<figure class="text-center">
    <h2 id="device_name"><span id="device_name_text">Solar2MQTT</span><svg class="wifi-symbol" viewBox="0 15 64 64"
            xmlns="http://www.w3.org/2000/svg" width="32" height="32">
            <title id="wifiTitle">WiFi-Signal</title>
            <path id="level5" d="M8 32 A33 32 0 0 1 56 32" stroke="black" stroke-width="4" fill="none" />
            <path id="level4" d="M14 38 A26 26 0 0 1 50 38" stroke="black" stroke-width="4" fill="none" />
            <path id="level3" d="M20 44 A18 20 0 0 1 44 44" stroke="black" stroke-width="4" fill="none" />
            <path id="level2" d="M26 50 A10 14 0 0 1 38 50" stroke="black" stroke-width="4" fill="none" />
            <circle id="level1" cx="32" cy="56" r="3" fill="black" />
        </svg></h2>
</figure>
<div class="dR row gx-0 mb-2">
    <div class="col" id="ClickSOC">
        <div class="progress" style="height:1.8rem;">
            <div id="packSOC" class="progress-bar dF" role="progressbar" style="width:0%;height:1.8rem;"
                aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
        </div>
    </div>
</div>

<div class="dR row gx-0 mb-2 bg-light rounded bg-opacity-50 px-2">
    <div class="col">Solar:</div>
    <div class="col dF">
        <span id="pv_volt"></span>
        <span id="pv_current"></span>
        <span id="pv_power"></span>
    </div>
</div>

<div class="dR row gx-0 mb-2 bg-light rounded bg-opacity-50 px-2">
    <div class="col">Solar2:</div>
    <div class="col dF">
        <span id="pv2_volt"></span>
        <span id="pv2_current"></span>
        <span id="pv2_power"></span>
    </div>
</div>

<div class="dR row gx-0 mb-2 bg-light rounded bg-opacity-50 px-2">
    <div class="col">Grid:</div>
    <div class="col dF">
        <span id="grid_volt"></span>
        <span id="grid_hz"></span>
    </div>
</div>

<div class="dR row gx-0 mb-2 bg-light rounded bg-opacity-50 px-2">
    <div class="col">AC out:</div>
    <div class="col dF">
        <span id="ac_out_volt"></span>
        <span id="ac_out_hz"></span>
        <span id="ac_out_power"></span>
        <span id="ac_out_percent"></span>
    </div>
</div>

<div class="dR row gx-0 mb-2 bg-light rounded bg-opacity-50 px-2">
    <div class="col">Temperature:</div>
    <div class="col dF">
        <span id="heatsink_temp"></span>
    </div>
</div>

<div class="dR row gx-0 mb-2 bg-light rounded bg-opacity-50 px-2">
    <div class="col">Battery:</div>
    <div class="col dF">
        <span id="batt_volt"></span>
        <span id="batt_load"></span>
        <span id="batt_percent"></span>
    </div>
</div>

<div class="dR row gx-0 mb-2 bg-light rounded bg-opacity-50 px-2">
    <div class="col">Inverter mode:</div>
    <div class="col dF">
        <span id="ivmode"></span>
    </div>
</div>

<div class="d-grid gap-2">
    <a class="btn btn-primary btn-block" href="/settings" role="button">Settings</a>
</div>


<script>
    var overviewPollTimer = null;
    var OVERVIEW_POLL_MS = 3000;

    $(document).ready(function () {
        loadMeta();
        updateOverview();
        startOverviewPolling();
    });
    window.addEventListener('pageshow', function () {
        startOverviewPolling();
        updateOverview();
    });
    window.addEventListener('pagehide', stopOverviewPolling);
    document.addEventListener('visibilitychange', function () {
        if (document.hidden) {
            stopOverviewPolling();
        } else {
            startOverviewPolling();
            updateOverview();
        }
    });

    var dataFields = document.querySelectorAll('.dR');
    var overviewRequestRunning = false;

    function setFieldValue(id, value, unit, round) {
        var element = document.getElementById(id);
        if (!element) {
            return false;
        }
        if (value === null || typeof value === 'undefined' || value === '' || Number.isNaN(value)) {
            return false;
        }
        var shownValue = round ? Math.round(Number(value)) : value;
        if (Number.isNaN(shownValue)) {
            return false;
        }
        element.innerHTML = shownValue + unit;
        return true;
    }

    function renderOverview(data) {
        if (!Array.isArray(data) || data.length < 18) {
            return;
        }

        setWiFiSignal(data[0]);
        const mappings = [
            ["packSOC", 1, "%"],
            ["pv_volt", 2, "V"],
            ["pv_current", 3, "A"],
            ["pv_power", 4, "W", true],
            ["pv2_volt", 5, "V"],
            ["pv2_current", 6, "A"],
            ["pv2_power", 7, "W", true],
            ["grid_volt", 8, "V"],
            ["grid_hz", 9, "Hz"],
            ["ac_out_volt", 10, "V"],
            ["ac_out_hz", 11, "Hz"],
            ["ac_out_power", 12, "W"],
            ["ac_out_percent", 13, "%"],
            ["heatsink_temp", 14, "&#176;C"],
            ["batt_volt", 15, "V"],
            ["batt_percent", 1, "%"],
            ["batt_load", 16, "A"],
            ["ivmode", 17, ""]
        ];

        mappings.forEach(([id, dataIndex, unit, round = false]) => {
            setFieldValue(id, data[dataIndex], unit, round);
        });

        var batteryPercent = Number(data[1]);
        if (!Number.isNaN(batteryPercent)) {
            $('#packSOC').width(batteryPercent + '%').attr('aria-valuenow', batteryPercent).text(Math.round(batteryPercent) + '%');
        }

        dataFields.forEach(dRDiv => {
            const spans = dRDiv.querySelectorAll('.dF span');
            let allUndefined = true;
            if (spans.length) {
                spans.forEach(span => {
                    const isInvalid = span.innerHTML === '' || span.innerHTML.startsWith('undefined') || span.innerHTML.startsWith('NaN') || span.innerHTML.startsWith('null');
                    span.style.display = isInvalid ? 'none' : '';
                    if (!isInvalid) allUndefined = false;
                });
            }
            else {
                const block = dRDiv.querySelector('.dF');
                allUndefined = !block || block.innerHTML === '' || block.innerHTML.startsWith('undefined') || block.innerHTML.startsWith('NaN') || block.innerHTML.startsWith('null');
            }
            dRDiv.style.display = allUndefined ? 'none' : '';
        });
    }

    function updateOverview() {
        if (overviewRequestRunning) {
            return;
        }
        overviewRequestRunning = true;
        fetch('/livejson', { cache: 'no-store' })
            .then(function (response) { return response.json(); })
            .then(function (data) { renderOverview(data); })
            .catch(function () { })
            .finally(function () { overviewRequestRunning = false; });
    }

    function startOverviewPolling() {
        if (overviewPollTimer) {
            return;
        }
        overviewPollTimer = setInterval(updateOverview, OVERVIEW_POLL_MS);
    }

    function stopOverviewPolling() {
        if (!overviewPollTimer) {
            return;
        }
        clearInterval(overviewPollTimer);
        overviewPollTimer = null;
    }

    const minRSSI = -85, maxRSSI = -60;
    function setWiFiSignal(rssi) {
        if (typeof rssi === 'undefined' || rssi === null) {
            return;
        }
        const lv = ['level1', 'level2', 'level3', 'level4', 'level5'],
            c = ['red', 'orange', 'gold', 'yellowgreen', 'green'],
            p = Math.max(0, Math.min(100, Math.round((rssi - minRSSI) * 100 / (maxRSSI - minRSSI)))),
            lvl = Math.floor(p / 25),
            col = c[Math.min(lvl, 4)];

        const svg = document.querySelector(".wifi-symbol");
        if (svg) {
            const title = svg.querySelector("title");
            if (title) title.textContent = p + "% Strength";
        }

        lv.forEach((id, i) => {
            const e = document.getElementById(id);
            if (e) (e.tagName === "circle" ? e.setAttribute("fill", i <= lvl ? col : "#ccc")
                : e.setAttribute("stroke", i <= lvl ? col : "#ccc"));
        });
    }
</script>
